<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
  
  .card {
    width: 1200px; height: 630px;
    background: #f5f5f0;
    position: relative;
    border: 6px solid #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }

  /* Background pattern */
  .card::before {
    content: '';
    position: absolute;
    top: 80px; right: 80px;
    width: 320px; height: 320px;
    border: 4px solid rgba(10,10,10,0.05);
    transform: rotate(15deg);
  }
  .card::after {
    content: '';
    position: absolute;
    top: 90px; right: 90px;
    width: 300px; height: 300px;
    border: 4px solid rgba(10,10,10,0.04);
    transform: rotate(25deg);
  }

  h1 {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -3px;
    color: #0a0a0a;
    line-height: 1;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .accent {
    color: #2f7f5f;
  }

  .tagline {
    font-size: 28px;
    font-weight: 700;
    color: #75756a;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }

  .bar {
    width: 100px; height: 6px;
    background: #f5e642;
    margin-top: 24px;
    border: 2px solid #0a0a0a;
    position: relative;
    z-index: 1;
  }

  .sub {
    font-size: 20px;
    font-weight: 600;
    color: #0a0a0a;
    margin-top: 24px;
    position: relative;
    z-index: 1;
  }

  .url {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 16px;
    font-weight: 500;
    color: #a8a49a;
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }

  /* Decorative dot grid */
  .dots {
    position: absolute;
    bottom: 60px; right: 80px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    z-index: 0;
    opacity: 0.3;
  }
  .dot {
    width: 12px; height: 12px;
    background: #0a0a0a;
  }
</style>
</head>
<body>
<div class="card">
  <h1>V<span class="accent">eloce</span></h1>
  <p class="tagline">A simple newsletter platform for your audience</p>
  <div class="bar"></div>
  <p class="sub">Write newsletters. Grow your audience. Free to start.</p>
  <p class="url">newsletter.brod3000.com</p>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>
</body>
</html>
